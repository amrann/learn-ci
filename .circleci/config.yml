version: 2.1

orbs:
  android: circleci/android@0.2.1

jobs:
  build:
    docker:
      - image: cimg/openjdk:17.0
    environment:
      ANDROID_HOME: /opt/android/sdk
      PATH: /opt/android/sdk/platform-tools:/opt/android/sdk/tools:$PATH
    steps:
      # - run:
      #     name: Install SSH Client
      #     command: sudo apt-get update && sudo apt-get install -y openssh-client
      - run:
          name: Switch to root user for installation
          command: |
            apt-get update && apt-get install -y openssh-client
      - checkout
      - run:
          name: Verify ANDROID_HOME
          command: |
            echo "ANDROID_HOME is set to $ANDROID_HOME"
            ls -l $ANDROID_HOME
      - run:
          name: Install Android SDK Components
          command: |
            sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2"
      - run:
          name: Create local.properties
          command: echo "sdk.dir=$ANDROID_HOME" > local.properties
      - restore_cache:
          key: android-orb-v1-
      - run:
          name: Chmod permissions
          command: chmod +x ./gradlew
      - run:
          name: Download Dependencies
          command: ./gradlew androidDependencies
      - save_cache:
          key: 'android-orb-v1-{{ epoch }}'
          paths:
            - ~/.android/build-cache
            - ~/.android/cache
      - run:
          name: Run Build
          command: ./gradlew build
      - store_artifacts:
          path: app/build/reports
          destination: reports
      - store_artifacts:
          path: app/build/outputs/apk/debug/
          destination: artifact-file